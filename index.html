<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oficina Emanuel - Sistema Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #areaImpressao { display: none; }
        @media print {
            body * { visibility: hidden; }
            #areaImpressao, #areaImpressao * { visibility: visible; }
            #areaImpressao { display: block !important; position: absolute; left: 0; top: 0; width: 52mm; margin: 0; padding: 0; background: white; }
            @page { size: 58mm auto; margin: 0; }
            .cupom-texto { font-family: 'Courier New', monospace; font-size: 12px; line-height: 1.2; text-transform: uppercase; color: black; }
            .hr { border-bottom: 1px dashed black; margin: 5px 0; width: 100%; }
            .c { text-align: center; } .b { font-weight: bold; }
            .espaco-fim { height: 60px; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, getDocs, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9_vQUtyjCx8KQw3k5fPlutOD-ekCaHw8",
            authDomain: "projeto-app-entregadores.firebaseapp.com",
            projectId: "projeto-app-entregadores",
            storageBucket: "projeto-app-entregadores.firebasestorage.app",
            messagingSenderId: "857050021216",
            appId: "1:857050021216:web:a16943cd5a272b0c4d3205"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let idAtual = null;
        let itensSelecionados = [];
        let clienteAtualSelecao = null;
        let valorOriginal = 0;

        window.mudarAba = (aba) => {
            document.querySelectorAll('.tela').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.className = "flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-blue-900");
            
            const btn = document.getElementById('btnAba' + aba.charAt(0).toUpperCase() + aba.slice(1));
            const tela = document.getElementById('tela' + aba.charAt(0).toUpperCase() + aba.slice(1));
            
            tela.classList.remove('hidden');
            btn.classList.add('bg-blue-900', 'text-white');
            if(aba === 'pendentes') carregarPendentes();
        };

        window.dispararPrint = (html) => {
            const area = document.getElementById('areaImpressao');
            area.innerHTML = `<div class="cupom-texto">${html}</div>`;
            setTimeout(() => { window.print(); }, 500);
        };

        window.imprimirCupom = (dados, tipo = 'OS') => {
            const desc = parseFloat(dados.desconto || 0);
            const total = parseFloat(dados.valor_servico || 0) - desc;
            
            const layout = `
                <div class="c b">EMANUEL SOLUCOES TECNOLOGICAS</div>
                <div class="c b">${tipo === 'OS' ? 'ORDEM DE SERVICO' : 'RECIBO DE PAGAMENTO'}</div>
                <div class="hr"></div>
                <div class="b">OS: ${dados.id} - COD: ${dados.codigo_maquina}</div>
                <div class="hr"></div>
                <div>DATA: ${dados.data_entrada}</div>
                <div>CLIENTE: ${dados.cliente}</div>
                <div>EQUIP.: ${dados.equipamento}</div>
                <div class="hr"></div>
                <div class="b">DEFEITO:</div>
                <div>${dados.defeito}</div>
                ${dados.servico_principal ? `
                    <div class="hr"></div>
                    <div class="b">PECA/SERVICO:</div>
                    <div>${dados.servico_principal}</div>
                    <div class="hr"></div>
                    <div class="b">SUBTOTAL: R$ ${parseFloat(dados.valor_servico).toFixed(2)}</div>
                    <div class="b text-red-600">DESCONTO: R$ ${desc.toFixed(2)}</div>
                    <div class="c b" style="font-size:16px; margin-top:5px; border:1px solid #000; padding:3px">TOTAL: R$ ${total.toFixed(2)}</div>
                ` : `
                    <div class="hr"></div>
                    <div style="height:40px; border-bottom:1px solid black; margin-top:20px"></div>
                    <div class="c" style="font-size:10px">ASSINATURA</div>
                `}
                <div class="hr"></div>
                <div class="c b">AGRADECEMOS A PREFERENCIA!</div>
                <div class="c" style="font-size:10px">DEUS E FIEL</div>
                <div class="espaco-fim"></div>`;
            window.dispararPrint(layout);
        };

        window.imprimirLote = () => {
            if (itensSelecionados.length < 2) return alert("Selecione 2 ou mais!");
            let totalBruto = 0; let totalDesconto = 0; let itensHTML = "";
            itensSelecionados.forEach(i => {
                const desc = parseFloat(i.desconto || 0);
                totalBruto += i.valor;
                totalDesconto += desc;
                itensHTML += `
                    <div style="margin-top:5px">
                        <b>ID:${i.id} - COD:${i.cod}</b><br>
                        SERV:${i.servico}<br>
                        VALOR: R$ ${(i.valor - desc).toFixed(2)}
                    </div>
                    <div style="border-bottom:1px solid #eee; margin:2px 0"></div>`;
            });
            const layout = `
                <div class="c b">EMANUEL SOLUCOES TECNOLOGICAS</div>
                <div class="c b">FECHAMENTO DE LOTE</div>
                <div class="hr"></div>
                <div>CLIENTE: ${clienteAtualSelecao}</div>
                <div class="hr"></div>
                ${itensHTML}
                <div class="hr"></div>
                <div>BRUTO: R$ ${totalBruto.toFixed(2)}</div>
                <div>DESCONTOS: R$ ${totalDesconto.toFixed(2)}</div>
                <div class="c b" style="font-size:16px; border:1px solid #000; padding:3px">TOTAL: R$ ${(totalBruto - totalDesconto).toFixed(2)}</div>
                <div class="espaco-fim"></div>`;
            window.dispararPrint(layout);
        };

        window.toggleSelecao = (id, cliente, valor, cod, defeito, servico, desconto) => {
            const index = itensSelecionados.findIndex(i => i.id === id);
            if (index > -1) {
                itensSelecionados.splice(index, 1);
                if (itensSelecionados.length === 0) clienteAtualSelecao = null;
            } else {
                if (clienteAtualSelecao && clienteAtualSelecao !== cliente) {
                    alert("MESMO CLIENTE!");
                    document.getElementById('chk' + id).checked = false;
                    return;
                }
                clienteAtualSelecao = cliente;
                itensSelecionados.push({ id, valor, cod, defeito, servico, desconto });
            }
            const total = itensSelecionados.reduce((a, b) => a + (b.valor - b.desconto), 0);
            document.getElementById('btnLote').classList.toggle('hidden', itensSelecionados.length < 2);
            document.getElementById('txtTotalLote').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('txtQtdLote').innerText = `${itensSelecionados.length} MÁQS`;
        };

        async function carregarPendentes() {
            itensSelecionados = []; clienteAtualSelecao = null;
            document.getElementById('btnLote').classList.add('hidden');
            const lista = document.getElementById('listaPendentes');
            lista.innerHTML = "<p class='p-10 text-center animate-pulse'>ATUALIZANDO...</p>";
            try {
                const snap = await getDocs(collection(db, "ordens"));
                lista.innerHTML = ""; let totalA = 0;
                snap.forEach(dDoc => {
                    const d = dDoc.data(); const status = (d.status || "").toUpperCase().trim();
                    if (status === "PENDENTE" || status === "AGUARDANDO PAGAMENTO") {
                        const valFinal = (d.valor_servico || 0) - (d.desconto || 0);
                        totalA += valFinal;
                        lista.innerHTML += `
                            <div class="bg-white p-5 rounded-[2.5rem] mb-5 shadow-xl border-l-[14px] ${status === 'PENDENTE' ? 'border-orange-500' : 'border-green-600'} relative">
                                <div class="absolute right-6 top-6"><input type="checkbox" id="chk${d.id}" onchange="toggleSelecao('${d.id}', '${d.cliente}', ${d.valor_servico || 0}, '${d.codigo_maquina}', '${d.defeito}', '${d.servico_principal}', ${d.desconto || 0})" class="w-8 h-8 rounded-full accent-blue-900"></div>
                                <div class="flex justify-between items-center mb-2 pr-12"><span class="text-[10px] font-black uppercase px-3 py-1 rounded-full ${status === 'PENDENTE' ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'} italic">${status}</span><span class="text-[10px] font-black text-blue-900 bg-blue-50 px-3 py-1 rounded-lg"># ${d.codigo_maquina}</span></div>
                                <h3 class="text-xl font-black text-blue-900 uppercase leading-none">${d.equipamento}</h3>
                                <p class="text-[11px] font-bold text-gray-500 mb-2 uppercase italic">👤 ${d.cliente}</p>
                                ${d.servico_principal ? `<div class="bg-blue-50 p-3 rounded-2xl mb-3 font-black text-blue-800 uppercase text-xs">🛠 ${d.servico_principal}</div>` : ''}
                                <div class="flex gap-2">
                                    ${status === 'PENDENTE' ? `<button onclick="abrirLancamento('${d.id}')" class="flex-1 bg-blue-900 text-white py-4 rounded-3xl font-black text-xs uppercase">LANÇAR</button>` : `<button onclick="prepararFinalizacao('${d.id}')" class="flex-1 bg-green-600 text-white py-4 rounded-3xl font-black text-xs uppercase">RECEBER</button>`}
                                    <button onclick='window.imprimirCupom(${JSON.stringify(d)}, "OS")' class="bg-gray-100 p-4 rounded-3xl text-xl">🖨️</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('resumoGeralBancada').innerText = `R$ ${totalA.toFixed(2)}`;
            } catch (e) { alert(e.message); }
        }

        window.abrirLancamento = async (id) => {
            idAtual = id; document.getElementById('modalServicos').classList.remove('hidden');
            const lista = document.getElementById('listaDeServicos');
            const snap = await getDocs(collection(db, "servicos_lista"));
            lista.innerHTML = "";
            snap.forEach(dDoc => {
                const s = dDoc.data(); const n = s.servico_lista || s.servico; const v = s.valor || 0;
                lista.innerHTML += `<button onclick="confirmarServico('${n}', ${v})" class="w-full p-5 mb-3 bg-slate-50 rounded-2xl text-left border-2 active:border-blue-900"><div class="font-black text-blue-900 uppercase text-xs">${n}</div><div class="text-green-600 font-black text-[10px]">R$ ${v.toFixed(2)}</div></button>`;
            });
        };

        window.confirmarServico = async (nome, preco) => {
            if(!confirm(`LANÇAR ${nome}?`)) return;
            await updateDoc(doc(db, "ordens", idAtual.toString()), { servico_principal: nome.toUpperCase(), valor_servico: preco, status: "AGUARDANDO PAGAMENTO", desconto: 0 });
            document.getElementById('modalServicos').classList.add('hidden'); carregarPendentes();
        };

        window.prepararFinalizacao = async (id) => {
            idAtual = id; document.getElementById('modalPagamento').classList.remove('hidden');
            const dSnap = await getDoc(doc(db, "ordens", id.toString()));
            valorOriginal = dSnap.data().valor_servico || 0;
            document.getElementById('inputDesconto').value = "";
            atualizarTotalComDesconto();
            const snapP = await getDocs(collection(db, "formas_pagamento"));
            const listaP = document.getElementById('listaFormasPag'); listaP.innerHTML = "";
            snapP.forEach(dDoc => {
                const f = dDoc.data();
                listaP.innerHTML += `<label class="flex items-center p-4 bg-gray-50 rounded-xl mb-2"><input type="radio" name="pag" value="${f.nome}" class="w-6 h-6 accent-blue-900"><span class="ml-4 font-black text-blue-900 uppercase text-xs italic">${f.nome}</span></label>`;
            });
        };

        window.atualizarTotalComDesconto = () => {
            const desc = parseFloat(document.getElementById('inputDesconto').value || 0);
            const total = valorOriginal - desc;
            document.getElementById('displayValor').innerText = "R$ " + total.toFixed(2);
        };

        window.confirmarPagamento = async () => {
            const radio = document.querySelector('input[name="pag"]:checked');
            const desc = parseFloat(document.getElementById('inputDesconto').value || 0);
            if(!radio) return alert("FORMA?");
            const docRef = doc(db, "ordens", idAtual.toString()); const dSnap = await getDoc(docRef); const dados = dSnap.data();
            dados.status = "PAGO"; dados.forma_pagamento = radio.value.toUpperCase(); dados.data_pagamento = new Date().toLocaleDateString('pt-BR');
            dados.desconto = desc;
            await updateDoc(docRef, dados); if(confirm("PAGO! IMPRIMIR?")) window.imprimirCupom(dados, 'RECIBO');
            document.getElementById('modalPagamento').classList.add('hidden'); carregarPendentes();
        };

        window.abrirSeletor = async (tipo) => {
            const modal = document.getElementById('modal'); const lista = document.getElementById('listaItens');
            modal.classList.remove('hidden'); lista.innerHTML = "<p class='p-10 text-center font-black animate-pulse'>...</p>";
            const snap = await getDocs(collection(db, tipo)); lista.innerHTML = "";
            snap.forEach(dDoc => { const d = dDoc.data(); const n = tipo === 'clientes' ? (d.nome || dDoc.id) : (d.equipamento || d.nome);
            lista.innerHTML += `<button onclick="definirItem('${tipo}', '${n}')" class="w-full p-6 text-left border-b font-black uppercase text-blue-900 italic text-sm">${n}</button>`; });
        };

        window.definirItem = (tipo, valor) => {
            if(tipo === 'clientes') document.getElementById('inputCliente').value = valor;
            else document.getElementById('inputEquipamento').value = valor;
            document.getElementById('modal').classList.add('hidden');
        };

        window.salvarEntrada = async () => {
            const c = document.getElementById('inputCliente').value; const e = document.getElementById('inputEquipamento').value; const d = document.getElementById('defeito').value.toUpperCase();
            const manualCod = document.getElementById('inputManualCod').value.toUpperCase().trim();
            if(!c || !e) return alert("DADOS!");
            const snapID = await getDocs(collection(db, "ordens")); let maior = 0;
            snapID.forEach(docS => { const idN = parseInt(docS.id); if(!isNaN(idN) && idN > maior) maior = idN; });
            const novoID = (maior + 1).toString();
            const codF = manualCod !== "" ? manualCod : Math.random().toString(36).substring(2,5).toUpperCase() + Math.floor(100 + Math.random() * 900);
            const dados = { id: parseInt(novoID), codigo_maquina: codF, cliente: c, equipamento: e, defeito: d, status: "PENDENTE", data_entrada: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now(), servico_principal: "", valor_servico: 0, forma_pagamento: "", data_pagamento: "", desconto: 0 };
            await setDoc(doc(db, "ordens", novoID), dados); alert(`GRAVADO!\nID: ${novoID}\nCÓDIGO: ${codF}`);
            document.getElementById('inputCliente').value = ""; document.getElementById('inputEquipamento').value = ""; document.getElementById('defeito').value = ""; document.getElementById('inputManualCod').value = "";
            mudarAba('pendentes');
        };

        window.buscarHistorico = async () => {
            const cod = document.getElementById('inputBuscaCod').value.toUpperCase().trim();
            const resultado = document.getElementById('resultadoConsulta');
            if(cod.length < 3) return alert("CÓDIGO?");
            resultado.innerHTML = "<p class='p-10 text-center animate-pulse'>BUSCANDO...</p>";
            const q = query(collection(db, "ordens"), where("codigo_maquina", "==", cod));
            const snap = await getDocs(q);
            if(snap.empty) { resultado.innerHTML = "<p class='p-10 text-center text-red-500 font-black'>NADA ENCONTRADO!</p>"; return; }
            let listaH = []; snap.forEach(d => listaH.push(d.data())); listaH.sort((a,b) => b.timestamp - a.timestamp);
            resultado.innerHTML = `<h2 class="text-blue-900 font-black mb-4 uppercase italic">Histórico: ${cod}</h2>`;
            listaH.forEach(h => {
                const total = h.valor_servico - (h.desconto || 0);
                resultado.innerHTML += `
                    <div class="bg-white p-4 rounded-3xl mb-4 shadow-md border-l-8 ${h.status === 'PAGO' ? 'border-green-500' : 'border-orange-500'}">
                        <div class="flex justify-between mb-1"><span class="text-[9px] font-black bg-slate-100 p-1">OS: ${h.id}</span><span class="text-[9px] font-black italic uppercase">${h.status}</span></div>
                        <p class="text-xs font-black text-blue-900 uppercase">${h.equipamento}</p>
                        <p class="text-[10px] bg-slate-50 p-2 rounded mb-2 leading-tight"><b>DEF:</b> ${h.defeito}<br><b>SERV:</b> ${h.servico_principal || '---'}</p>
                        <div class="flex justify-between items-center"><p class="font-black text-green-700 text-xs">TOTAL: R$ ${total.toFixed(2)}</p><p class="text-[8px] opacity-40">${h.data_entrada}</p></div>
                    </div>`;
            });
        };

        window.onload = () => carregarPendentes();
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div id="areaImpressao"></div>

    <nav class="flex bg-white shadow-lg p-2 sticky top-0 z-[50] gap-1">
        <button id="btnAbaEntrada" onclick="mudarAba('entrada')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-blue-900">Entrada</button>
        <button id="btnAbaPendentes" onclick="mudarAba('pendentes')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] bg-blue-900 text-white shadow-md">Bancada</button>
        <button id="btnAbaConsulta" onclick="mudarAba('consulta')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-blue-900">Histórico</button>
    </nav>

    <div id="telaConsulta" class="tela hidden p-4 max-w-md mx-auto">
        <div class="bg-white rounded-[2rem] p-5 shadow-xl mb-6 text-center">
            <h2 class="text-lg font-black text-blue-900 uppercase italic mb-4">Buscar Código</h2>
            <input id="inputBuscaCod" type="text" maxlength="6" placeholder="EX: ABC123" class="w-full p-5 rounded-2xl bg-slate-100 font-black text-blue-900 uppercase text-center outline-none mb-3">
            <button onclick="buscarHistorico()" class="w-full bg-blue-900 text-white py-5 rounded-2xl font-black italic uppercase shadow-md">VER HISTÓRICO</button>
        </div>
        <div id="resultadoConsulta" class="pb-24"></div>
    </div>

    <div id="telaPendentes" class="tela p-4 max-w-md mx-auto">
        <div class="bg-blue-900 rounded-[2.5rem] p-7 mb-6 text-white text-center shadow-2xl">
            <p class="text-[10px] font-black opacity-60 uppercase italic">A Receber Total</p>
            <h1 id="resumoGeralBancada" class="text-4xl font-black italic">R$ 0,00</h1>
        </div>
        <div id="btnLote" class="hidden bg-green-600 rounded-[2.5rem] p-6 mb-6 text-white flex justify-between items-center shadow-xl">
            <div><p id="txtQtdLote" class="text-[10px] font-black uppercase italic">0 ITENS</p><p id="txtTotalLote" class="text-2xl font-black italic">R$ 0,00</p></div>
            <button onclick="imprimirLote()" class="bg-white text-green-600 px-6 py-4 rounded-3xl font-black text-[10px] uppercase">GERAR LOTE</button>
        </div>
        <div id="listaPendentes" class="pb-24"></div>
    </div>

    <div id="telaEntrada" class="tela hidden p-4 space-y-5 max-w-md mx-auto text-center">
        <header class="py-2"><h1 class="text-3xl font-black text-blue-900 uppercase italic">Nova Entrada</h1></header>
        <input id="inputCliente" readonly onclick="abrirSeletor('clientes')" type="text" placeholder="CLIENTE" class="w-full p-6 rounded-[2rem] bg-white shadow-md font-black text-blue-900 uppercase outline-none">
        <input id="inputEquipamento" readonly onclick="abrirSeletor('maquinas')" type="text" placeholder="EQUIPAMENTO" class="w-full p-6 rounded-[2rem] bg-white shadow-md font-black text-blue-900 uppercase outline-none">
        <input id="inputManualCod" type="text" maxlength="6" placeholder="CÓDIGO MANUAL (SE TIVER)" class="w-full p-6 rounded-[2rem] bg-white shadow-md font-black text-blue-900 uppercase outline-none">
        <textarea id="defeito" placeholder="DEFEITO..." class="w-full p-6 rounded-[2rem] bg-white shadow-md font-bold text-slate-700 h-32 uppercase outline-none"></textarea>
        <button id="btnGravar" onclick="salvarEntrada()" class="w-full bg-blue-900 text-white p-6 rounded-[3rem] font-black text-xl shadow-xl">GRAVAR</button>
    </div>

    <div id="modalPagamento" class="hidden fixed inset-0 bg-blue-900/95 z-[110] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 flex flex-col max-h-[90vh] shadow-2xl">
            <h2 class="text-2xl font-black text-blue-900 uppercase italic text-center mb-4">Receber</h2>
            <div class="text-center mb-4">
                <p class="text-[10px] font-black text-gray-400">TOTAL FINAL</p>
                <h3 id="displayValor" class="text-5xl font-black text-green-600 italic">R$ 0,00</h3>
            </div>
            <div class="mb-6">
                <p class="text-[10px] font-black text-blue-900 mb-1">VALOR DO DESCONTO (R$)</p>
                <input id="inputDesconto" type="number" oninput="atualizarTotalComDesconto()" placeholder="0,00" class="w-full p-4 rounded-2xl bg-slate-100 font-black text-red-600 outline-none border-2 border-transparent focus:border-red-500">
            </div>
            <div id="listaFormasPag" class="overflow-y-auto flex-1 mb-6"></div>
            <div class="flex gap-3"><button onclick="document.getElementById('modalPagamento').classList.add('hidden')" class="flex-1 bg-slate-100 p-5 rounded-3xl font-black text-xs">Sair</button><button onclick="confirmarPagamento()" class="flex-2 bg-green-600 text-white p-5 rounded-3xl font-black text-xs uppercase">Confirmar</button></div>
        </div>
    </div>

    <div id="modalServicos" class="hidden fixed inset-0 bg-blue-900/95 z-[100] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 flex flex-col max-h-[85vh] shadow-2xl"><h2 class="text-2xl font-black text-blue-900 uppercase italic mb-6 text-center">Peças/Serviços</h2><div id="listaDeServicos" class="overflow-y-auto flex-1"></div><button onclick="document.getElementById('modalServicos').classList.add('hidden')" class="mt-6 w-full p-6 bg-slate-100 rounded-3xl font-black text-xs uppercase">Sair</button></div>
    </div>
    <div id="modal" class="hidden fixed inset-0 bg-blue-900/90 z-[100] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl max-h-[80vh] flex flex-col overflow-hidden"><div class="p-8 border-b flex justify-between items-center"><h2 class="font-black text-blue-900 text-sm uppercase italic">Selecionar</h2><button onclick="document.getElementById('modal').classList.add('hidden')" class="text-red-500 font-black text-[10px] uppercase bg-red-100 px-6 py-2 rounded-full">Fechar</button></div><div id="listaItens" class="overflow-y-auto flex-1"></div></div>
    </div>
</body>
</html>
