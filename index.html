<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oficina Emanuel - Copiar Recibo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9_vQUtyjCx8KQw3k5fPlutOD-ekCaHw8",
            authDomain: "projeto-app-entregadores.firebaseapp.com",
            projectId: "projeto-app-entregadores",
            storageBucket: "projeto-app-entregadores.firebasestorage.app",
            messagingSenderId: "857050021216",
            appId: "1:857050021216:web:a16943cd5a272b0c4d3205"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let idAtual = null;
        let itensSelecionados = [];
        let clienteAtualSelecao = null;

        // --- FUNÇÃO PARA COPIAR TEXTO ---
        window.copiarParaImpressora = (texto) => {
            navigator.clipboard.writeText(texto).then(() => {
                alert("RECIBO COPIADO! Cole no RawBT para imprimir.");
            }).catch(err => {
                // Caso o navegador bloqueie o clipboard, mostra num prompt para copiar manual
                window.prompt("Cópia automática falhou. Copie o texto abaixo:", texto);
            });
        };

        // --- FORMATAR RECIBO UNITÁRIO ---
        window.gerarTextoCupom = (dados, tipo = 'OS') => {
            const linha = "--------------------------------\n";
            let txt = "   EMANUEL SOLUCOES TECNICAS    \n";
            txt += tipo === 'OS' ? "       ORDEM DE SERVICO         \n" : "      RECIBO DE PAGAMENTO       \n";
            txt += linha;
            txt += `OS: ${dados.id}      COD: ${dados.codigo_maquina}\n`;
            txt += linha;
            txt += `DATA: ${dados.data_entrada}\n`;
            txt += `CLIENTE: ${dados.cliente.substring(0,23)}\n`;
            txt += `EQUIP: ${dados.equipamento.substring(0,25)}\n`;
            txt += linha;
            txt += `DEFEITO:\n${dados.defeito}\n`;
            
            if (dados.servico_principal) {
                txt += linha;
                txt += `SERVICO: ${dados.servico_principal}\n`;
                txt += linha;
                txt += `TOTAL: R$ ${parseFloat(dados.valor_servico).toFixed(2)}\n`;
            } else {
                txt += "\n\n________________________________\n";
                txt += "      ASSINATURA CLIENTE        \n";
            }
            
            txt += linha;
            txt += "    AGRADECEMOS A PREFERENCIA   \n";
            txt += "          DEUS E FIEL           \n\n\n\n";
            
            window.copiarParaImpressora(txt);
        };

        // --- FORMATAR RECIBO DE LOTE ---
        window.gerarTextoLote = () => {
            if (itensSelecionados.length < 2) return alert("Selecione 2 ou mais!");
            const linha = "--------------------------------\n";
            let totalLote = 0;
            let txt = "   EMANUEL SOLUCOES TECNICAS    \n";
            txt += "       FECHAMENTO DE LOTE       \n";
            txt += linha;
            txt += `CLIENTE: ${clienteAtualSelecao}\n`;
            txt += `DATA: ${new Date().toLocaleDateString('pt-BR')}\n`;
            txt += linha;
            
            itensSelecionados.forEach(i => {
                totalLote += i.valor;
                txt += `ID:${i.id} COD:${i.cod}\n`;
                txt += `DEF:${i.defeito.substring(0,28)}\n`;
                txt += `SERV:${i.servico.substring(0,27)}\n`;
                txt += `VALOR: R$ ${i.valor.toFixed(2)}\n`;
                txt += "- - - - - - - - - - - - - - - - \n";
            });

            txt += linha;
            txt += `TOTAL GERAL: R$ ${totalLote.toFixed(2)}\n`;
            txt += linha;
            txt += "          DEUS E FIEL           \n\n\n\n";
            
            window.copiarParaImpressora(txt);
        };

        // --- LOGICA DO FIREBASE E NAVEGAÇÃO ---
        window.mudarAba = (aba) => {
            document.getElementById('telaEntrada').classList.toggle('hidden', aba !== 'entrada');
            document.getElementById('telaPendentes').classList.toggle('hidden', aba !== 'pendentes');
            if(aba === 'pendentes') carregarPendentes();
        };

        window.toggleSelecao = (id, cliente, valor, cod, defeito, servico) => {
            const index = itensSelecionados.findIndex(i => i.id === id);
            if (index > -1) {
                itensSelecionados.splice(index, 1);
                if (itensSelecionados.length === 0) clienteAtualSelecao = null;
            } else {
                if (clienteAtualSelecao && clienteAtualSelecao !== cliente) {
                    alert("Apenas itens do mesmo cliente!");
                    document.getElementById('chk' + id).checked = false;
                    return;
                }
                clienteAtualSelecao = cliente;
                itensSelecionados.push({ id, valor, cod, defeito, servico });
            }
            const total = itensSelecionados.reduce((a, b) => a + b.valor, 0);
            const painel = document.getElementById('btnLote');
            painel.classList.toggle('hidden', itensSelecionados.length < 2);
            document.getElementById('txtTotalLote').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('txtQtdLote').innerText = `${itensSelecionados.length} MÁQUINAS`;
        };

        async function carregarPendentes() {
            itensSelecionados = []; clienteAtualSelecao = null;
            document.getElementById('btnLote').classList.add('hidden');
            const lista = document.getElementById('listaPendentes');
            lista.innerHTML = "<p class='p-10 text-center animate-pulse'>CARREGANDO...</p>";
            try {
                const snap = await getDocs(collection(db, "ordens"));
                lista.innerHTML = "";
                let totalAcumulado = 0;
                snap.forEach(dDoc => {
                    const d = dDoc.data();
                    const status = (d.status || "").toUpperCase().trim();
                    if (status === "PENDENTE" || status === "AGUARDANDO PAGAMENTO") {
                        totalAcumulado += (d.valor_servico || 0);
                        lista.innerHTML += `
                            <div class="bg-white p-5 rounded-[2.5rem] mb-5 shadow-xl border-l-[14px] ${status === 'PENDENTE' ? 'border-orange-500' : 'border-green-600'} relative">
                                <div class="absolute right-6 top-6">
                                    <input type="checkbox" id="chk${d.id}" onchange="toggleSelecao('${d.id}', '${d.cliente}', ${d.valor_servico || 0}, '${d.codigo_maquina}', '${d.defeito}', '${d.servico_principal || 'PENDENTE'}')" class="w-8 h-8 rounded-full accent-blue-900">
                                </div>
                                <div class="mb-2">
                                    <span class="text-[10px] font-black uppercase px-3 py-1 rounded-full ${status === 'PENDENTE' ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'} italic">${status}</span>
                                    <span class="text-[10px] font-black text-blue-900 bg-blue-50 px-3 py-1 rounded-lg ml-2">#${d.codigo_maquina}</span>
                                </div>
                                <h3 class="text-xl font-black text-blue-900 uppercase">${d.equipamento}</h3>
                                <p class="text-xs font-bold text-gray-400 mb-3 uppercase">👤 ${d.cliente}</p>
                                <div class="flex gap-2">
                                    ${status === 'PENDENTE' ? `<button onclick="abrirLancamento('${d.id}')" class="flex-1 bg-blue-900 text-white py-4 rounded-2xl font-black text-xs">LANÇAR</button>` : `<button onclick="prepararFinalizacao('${d.id}')" class="flex-1 bg-green-600 text-white py-4 rounded-2xl font-black text-xs">RECEBER</button>`}
                                    <button onclick='window.gerarTextoCupom(${JSON.stringify(d)}, "OS")' class="bg-gray-100 p-4 rounded-2xl text-lg shadow-inner">📋</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('resumoGeralBancada').innerText = `R$ ${totalAcumulado.toFixed(2)}`;
            } catch (e) { alert(e.message); }
        }

        window.abrirLancamento = async (id) => {
            idAtual = id; document.getElementById('modalServicos').classList.remove('hidden');
            const lista = document.getElementById('listaDeServicos');
            const snap = await getDocs(collection(db, "servicos_lista"));
            lista.innerHTML = "";
            snap.forEach(dDoc => {
                const s = dDoc.data(); const n = s.servico_lista || s.servico; const v = s.valor || 0;
                lista.innerHTML += `<button onclick="confirmarServico('${n}', ${v})" class="w-full p-5 mb-3 bg-slate-50 rounded-2xl text-left font-black text-blue-900 uppercase text-xs border border-slate-100">${n} - R$ ${v.toFixed(2)}</button>`;
            });
        };

        window.confirmarServico = async (nome, preco) => {
            if(!confirm(`LANÇAR ${nome}?`)) return;
            await updateDoc(doc(db, "ordens", idAtual.toString()), { servico_principal: nome.toUpperCase(), valor_servico: preco, status: "AGUARDANDO PAGAMENTO" });
            document.getElementById('modalServicos').classList.add('hidden'); carregarPendentes();
        };

        window.prepararFinalizacao = async (id) => {
            idAtual = id; document.getElementById('modalPagamento').classList.remove('hidden');
            const docSnap = await getDoc(doc(db, "ordens", id.toString()));
            document.getElementById('displayValor').innerText = "R$ " + docSnap.data().valor_servico.toFixed(2);
            const snapP = await getDocs(collection(db, "formas_pagamento"));
            const listaP = document.getElementById('listaFormasPag'); listaP.innerHTML = "";
            snapP.forEach(dDoc => { const f = dDoc.data(); listaP.innerHTML += `<label class="flex items-center p-4 bg-gray-50 rounded-xl mb-2"><input type="radio" name="pag" value="${f.nome}" class="w-5 h-5 accent-blue-900"><span class="ml-3 font-black text-blue-900 uppercase text-xs italic">${f.nome}</span></label>`; });
        };

        window.confirmarPagamento = async () => {
            const r = document.querySelector('input[name="pag"]:checked'); if(!r) return alert("FORMA?");
            const docRef = doc(db, "ordens", idAtual.toString()); const dSnap = await getDoc(docRef); const dados = dSnap.data();
            dados.status = "PAGO"; dados.forma_pagamento = r.value.toUpperCase(); dados.data_pagamento = new Date().toLocaleDateString('pt-BR');
            await updateDoc(docRef, dados); if(confirm("PAGO! COPIAR RECIBO?")) window.gerarTextoCupom(dados, 'RECIBO');
            document.getElementById('modalPagamento').classList.add('hidden'); carregarPendentes();
        };

        window.abrirSeletor = async (t) => {
            const m = document.getElementById('modal'); const l = document.getElementById('listaItens'); m.classList.remove('hidden');
            const s = await getDocs(collection(db, t)); l.innerHTML = "";
            s.forEach(dDoc => { const d = dDoc.data(); const n = t === 'clientes' ? (d.nome || d.BETINHO || dDoc.id) : (d.equipamento || d.nome);
            l.innerHTML += `<button onclick="definirItem('${t}', '${n}')" class="w-full p-5 text-left border-b font-black uppercase text-blue-900 italic text-sm">${n}</button>`; });
        };

        window.definirItem = (t, v) => { if(t === 'clientes') document.getElementById('inputCliente').value = v; else document.getElementById('inputEquipamento').value = v; document.getElementById('modal').classList.add('hidden'); };

        window.salvarEntrada = async () => {
            const c = document.getElementById('inputCliente').value; const e = document.getElementById('inputEquipamento').value; const d = document.getElementById('defeito').value.toUpperCase();
            if(!c || !e) return alert("DADOS!");
            const snapID = await getDocs(collection(db, "ordens")); let m = 0; snapID.forEach(s => { const n = parseInt(s.id); if(!isNaN(n) && n > m) m = n; });
            const nID = (m + 1).toString(); const cod = Math.random().toString(36).substring(2,5).toUpperCase() + Math.floor(100 + Math.random() * 900);
            const dados = { id: parseInt(nID), codigo_maquina: cod, cliente: c, equipamento: e, defeito: d, status: "PENDENTE", data_entrada: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now(), servico_principal: "", valor_servico: 0, forma_pagamento: "", data_pagamento: "", observacoes: "" };
            await setDoc(doc(db, "ordens", nID), dados); if(confirm("GRAVADO! COPIAR OS?")) window.gerarTextoCupom(dados, 'OS'); mudarAba('pendentes');
        };

        window.onload = () => carregarPendentes();
    </script>
</head>
<body class="bg-slate-100 min-h-screen">

    <nav class="flex bg-white shadow p-2 sticky top-0 z-50">
        <button onclick="mudarAba('entrada')" class="flex-1 p-4 font-black uppercase text-xs text-blue-900">Entrada</button>
        <button onclick="mudarAba('pendentes')" class="flex-1 p-4 font-black uppercase text-xs bg-blue-900 text-white rounded-xl">Bancada</button>
    </nav>

    <div id="telaPendentes" class="p-4 max-w-md mx-auto">
        <div class="bg-blue-900 rounded-[2rem] p-6 mb-4 text-white shadow-xl text-center">
            <p class="text-[10px] font-black opacity-50 uppercase italic">A Receber</p>
            <h1 id="resumoGeralBancada" class="text-3xl font-black italic">R$ 0,00</h1>
        </div>

        <div id="btnLote" class="hidden bg-green-600 rounded-[2rem] p-5 mb-4 text-white shadow-lg flex justify-between items-center">
            <h2 id="txtTotalLote" class="text-xl font-black">R$ 0,00</h2>
            <button onclick="gerarTextoLote()" class="bg-white text-green-600 px-4 py-2 rounded-xl font-black text-xs uppercase">COPIAR LOTE</button>
        </div>
        <div id="listaPendentes" class="pb-20"></div>
    </div>

    <div id="telaEntrada" class="hidden p-4 space-y-4 max-w-md mx-auto">
        <input id="inputCliente" readonly onclick="abrirSeletor('clientes')" type="text" placeholder="CLIENTE" class="w-full p-6 rounded-2xl bg-white shadow font-black text-blue-900 uppercase outline-none">
        <input id="inputEquipamento" readonly onclick="abrirSeletor('maquinas')" type="text" placeholder="EQUIPAMENTO" class="w-full p-6 rounded-2xl bg-white shadow font-black text-blue-900 uppercase outline-none">
        <textarea id="defeito" placeholder="DEFEITO..." class="w-full p-6 rounded-2xl bg-white shadow font-bold text-slate-700 h-32 uppercase outline-none"></textarea>
        <button onclick="salvarEntrada()" class="w-full bg-blue-900 text-white p-6 rounded-2xl font-black text-lg">GRAVAR</button>
    </div>

    <div id="modalServicos" class="hidden fixed inset-0 bg-blue-900/95 z-[100] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 flex flex-col max-h-[80vh] shadow-2xl">
            <h2 class="text-xl font-black text-blue-900 uppercase italic mb-4 text-center">Serviços</h2>
            <div id="listaDeServicos" class="overflow-y-auto flex-1"></div>
            <button onclick="document.getElementById('modalServicos').classList.add('hidden')" class="mt-4 w-full p-4 bg-slate-100 rounded-xl font-black text-xs uppercase">Voltar</button>
        </div>
    </div>

    <div id="modalPagamento" class="hidden fixed inset-0 bg-blue-900/95 z-[110] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-6 flex flex-col">
            <h2 class="text-xl font-black text-blue-900 uppercase italic text-center mb-4">Receber</h2>
            <h3 id="displayValor" class="text-4xl font-black text-green-600 italic text-center mb-6">R$ 0,00</h3>
            <div id="listaFormasPag" class="mb-6"></div>
            <div class="flex gap-2">
                <button onclick="document.getElementById('modalPagamento').classList.add('hidden')" class="flex-1 bg-slate-100 p-4 rounded-xl font-black text-xs">Sair</button>
                <button onclick="confirmarPagamento()" class="flex-2 bg-green-600 text-white p-4 rounded-xl font-black text-xs uppercase">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-blue-900/90 z-[100] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[2rem] shadow-2xl max-h-[70vh] flex flex-col overflow-hidden">
            <div id="listaItens" class="overflow-y-auto flex-1"></div>
            <button onclick="document.getElementById('modal').classList.add('hidden')" class="p-4 bg-red-100 text-red-500 font-black text-xs uppercase">Fechar</button>
        </div>
    </div>

</body>
</html>
