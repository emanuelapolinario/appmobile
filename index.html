<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oficina Emanuel - Sistema Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Oculta a área de impressão na tela normal */
        #areaImpressao { 
            display: none; 
        }

        /* Configurações EXCLUSIVAS para a Impressora Térmica Newpass (58mm) */
        @media print {
            body * { 
                visibility: hidden; 
            }
            #areaImpressao, #areaImpressao * { 
                visibility: visible; 
            }
            #areaImpressao { 
                display: block !important; 
                position: absolute; 
                left: 0; 
                top: 0; 
                width: 52mm; 
                margin: 0; 
                padding: 0; 
                background: white; 
            }
            @page { 
                size: 58mm auto; 
                margin: 0; 
            }
            .cupom-texto { 
                font-family: 'Courier New', Courier, monospace; 
                font-size: 11px; 
                line-height: 1.1; 
                text-transform: uppercase; 
                color: black; 
            }
            .hr { 
                border-bottom: 1px dashed black; 
                margin: 4px 0; 
                width: 100%; 
            }
            .c { text-align: center; } 
            .b { font-weight: bold; }
            .espaco-fim { height: 60px; } 
        }
        
        /* Ajuste para inputs no Android */
        input, textarea { -webkit-appearance: none; border-radius: 0; }
        
        /* Scrollbar mais escura para combinar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #18181b; }
        ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, getDocs, getDoc, query, where } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9_vQUtyjCx8KQw3k5fPlutOD-ekCaHw8",
            authDomain: "projeto-app-entregadores.firebaseapp.com",
            projectId: "projeto-app-entregadores",
            storageBucket: "projeto-app-entregadores.firebasestorage.app",
            messagingSenderId: "857050021216",
            appId: "1:857050021216:web:a16943cd5a272b0c4d3205"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // VARIÁVEIS GLOBAIS DO SISTEMA
        let idAtual = null;
        let itensSelecionadosLote = [];
        let clienteAtualSelecao = null;
        let listaServicosTemporaria = [];
        let valorBrutoGlobal = 0;
        let ordensBancada = {}; // Guarda todos os dados da OS para o lote

        // ==========================================
        // 1. NAVEGAÇÃO ENTRE AS ABAS
        // ==========================================
        window.mudarAba = (aba) => {
            document.getElementById('telaEntrada').classList.add('hidden');
            document.getElementById('telaPendentes').classList.add('hidden');
            document.getElementById('telaConsulta').classList.add('hidden');
            
            document.getElementById('btnAbaEntrada').className = "flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-zinc-400 transition-all active:scale-95";
            document.getElementById('btnAbaPendentes').className = "flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-zinc-400 transition-all active:scale-95";
            document.getElementById('btnAbaConsulta').className = "flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-zinc-400 transition-all active:scale-95";

            if (aba === 'entrada') {
                document.getElementById('telaEntrada').classList.remove('hidden');
                document.getElementById('btnAbaEntrada').classList.add('bg-blue-600', 'text-white', 'shadow-md');
            } else if (aba === 'pendentes') {
                document.getElementById('telaPendentes').classList.remove('hidden');
                document.getElementById('btnAbaPendentes').classList.add('bg-blue-600', 'text-white', 'shadow-md');
                carregarPendentes();
            } else if (aba === 'consulta') {
                document.getElementById('telaConsulta').classList.remove('hidden');
                document.getElementById('btnAbaConsulta').classList.add('bg-blue-600', 'text-white', 'shadow-md');
            }
        };

        // ==========================================
        // 2. SISTEMA DE IMPRESSÃO E LOTE PREMIUM
        // ==========================================
        window.dispararPrint = (html) => {
            const area = document.getElementById('areaImpressao');
            area.innerHTML = `<div class="cupom-texto">${html}</div>`;
            setTimeout(() => { window.print(); }, 500);
        };

        window.imprimirCupom = (dados, tipo = 'OS') => {
            const bruto = parseFloat(dados.valor_bruto) || (parseFloat(dados.valor_servico || 0) + parseFloat(dados.desconto || 0));
            const desc = parseFloat(dados.desconto || 0);
            const total = parseFloat(dados.valor_servico || 0); 

            let html = `
                <div class="c b">EMANUEL SOLUCOES TECNOLOGICAS</div>
                <div class="c b">${tipo === 'OS' ? 'ORDEM DE SERVICO' : 'RECIBO DE PAGAMENTO'}</div>
                <div class="hr"></div>
                <div class="b">OS: ${dados.id} - COD: ${dados.codigo_maquina}</div>
                <div class="hr"></div>
                <div>DATA: ${dados.data_entrada}</div>
                <div>CLIENTE: ${dados.cliente}</div>
                <div>EQUIP.: ${dados.equipamento}</div>
                <div class="hr"></div>
                <div class="b">DEFEITO:</div>
                <div>${dados.defeito}</div>
            `;

            if (dados.servico_principal) {
                html += `
                    <div class="hr"></div>
                    <div class="b">SERVICOS REALIZADOS:</div>
                    <div style="font-size:10px">${dados.servico_principal.replace(/\+/g, '<br>')}</div>
                    <div class="hr"></div>
                `;
                if (desc > 0) {
                    html += `
                        <div>SUBTOTAL: R$ ${bruto.toFixed(2)}</div>
                        <div>DESCONTO: R$ ${desc.toFixed(2)}</div>
                    `;
                }
                html += `<div class="c b" style="font-size:16px; margin-top:5px; border:2px solid black; padding:4px">TOTAL: R$ ${total.toFixed(2)}</div>`;
            } else {
                html += `
                    <div class="hr"></div>
                    <div style="height:40px; border-bottom:1px solid black; margin-top:20px"></div>
                    <div class="c" style="font-size:10px">ASSINATURA DO CLIENTE</div>
                `;
            }

            html += `
                <div class="hr"></div>
                <div class="c b">AGRADECEMOS A PREFERENCIA!</div>
                <div class="c" style="font-size:10px">DEUS E FIEL</div>
                <div class="espaco-fim"></div>
            `;
            window.dispararPrint(html);
        };

        window.imprimirLote = () => {
            if (itensSelecionadosLote.length < 2) return alert("Selecione 2 ou mais OS para imprimir lote!");
            
            let totalLiquidoLote = 0; 
            let totalDescontoLote = 0;
            let totalBrutoLote = 0;
            let itensHTML = "";
            
            itensSelecionadosLote.forEach(d => {
                const liquido = parseFloat(d.valor_servico || 0);
                const desconto = parseFloat(d.desconto || 0);
                const bruto = parseFloat(d.valor_bruto) || (liquido + desconto);

                totalLiquidoLote += liquido; 
                totalDescontoLote += desconto;
                totalBrutoLote += bruto;
                
                itensHTML += `
                    <div style="margin-top:8px; margin-bottom: 8px; text-align: left;">
                        <div class="b">OS: ${d.id} - COD: ${d.codigo_maquina}</div>
                        <div>DATA: ${d.data_entrada}</div>
                        <div><span class="b">DEF:</span> ${d.defeito}</div>
                        <div><span class="b">SERV:</span> <span style="font-size:10px">${d.servico_principal ? d.servico_principal.replace(/\+/g, '<br>') : '---'}</span></div>
                        ${desconto > 0 ? `
                            <div style="margin-top:3px; font-size:10px;">SUBTOTAL: R$ ${bruto.toFixed(2)}</div>
                            <div style="font-size:10px;">DESCONTO: R$ ${desconto.toFixed(2)}</div>
                        ` : ''}
                        <div class="b" style="margin-top:3px; text-align: right; font-size: 13px;">VALOR: R$ ${liquido.toFixed(2)}</div>
                    </div>
                    <div class="hr"></div>
                `;
            });
            
            const layout = `
                <div class="c b">EMANUEL SOLUCOES TECNOLOGICAS</div>
                <div class="c b">FECHAMENTO DE SERVICOS</div>
                <div class="hr"></div>
                <div class="b" style="font-size: 12px;">CLIENTE: ${clienteAtualSelecao}</div>
                <div class="hr"></div>
                ${itensHTML}
                <div style="margin-top: 10px; text-align: right; font-size: 11px;">
                    ${totalDescontoLote > 0 ? `
                        <div>SOMA DOS SERVICOS: R$ ${totalBrutoLote.toFixed(2)}</div>
                        <div class="b">TOTAL DESCONTOS: R$ ${totalDescontoLote.toFixed(2)}</div>
                    ` : ''}
                </div>
                <div class="c b" style="font-size:16px; border:2px solid black; padding:4px; margin-top: 5px;">TOTAL A PAGAR: R$ ${totalLiquidoLote.toFixed(2)}</div>
                <div class="hr"></div>
                <div class="c b">AGRADECEMOS A PREFERENCIA!</div>
                <div class="c" style="font-size:10px">DEUS E FIEL</div>
                <div class="espaco-fim"></div>
            `;
            window.dispararPrint(layout);
        };

        // ==========================================
        // 3. ABA BANCADA (CARREGAR E MARCAR LOTE)
        // ==========================================
        window.toggleSelecao = (idOS) => {
            const d = ordensBancada[idOS];
            const cliente = d.cliente;
            
            const index = itensSelecionadosLote.findIndex(i => i.id === d.id);
            
            if (index > -1) {
                itensSelecionadosLote.splice(index, 1);
                if (itensSelecionadosLote.length === 0) clienteAtualSelecao = null;
            } else {
                if (clienteAtualSelecao && clienteAtualSelecao !== cliente) {
                    alert("Selecione apenas equipamentos do MESMO CLIENTE para gerar o lote!");
                    document.getElementById('chk' + idOS).checked = false;
                    return;
                }
                clienteAtualSelecao = cliente;
                itensSelecionadosLote.push(d); // Salva o objeto inteiro
            }
            
            const total = itensSelecionadosLote.reduce((a, b) => a + parseFloat(b.valor_servico || 0), 0);
            
            const btnLote = document.getElementById('btnLote');
            if (itensSelecionadosLote.length >= 2) {
                btnLote.classList.remove('hidden');
                btnLote.classList.add('flex');
            } else {
                btnLote.classList.add('hidden');
                btnLote.classList.remove('flex');
            }
            
            document.getElementById('txtTotalLote').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('txtQtdLote').innerText = `${itensSelecionadosLote.length} MÁQS`;
        };

        async function carregarPendentes() {
            itensSelecionadosLote = []; 
            clienteAtualSelecao = null;
            ordensBancada = {}; // Zera o registro de bancada
            document.getElementById('btnLote').classList.add('hidden');
            document.getElementById('btnLote').classList.remove('flex');
            
            const lista = document.getElementById('listaPendentes');
            lista.innerHTML = "<p class='p-10 text-center animate-pulse font-black text-blue-400'>Sincronizando Banco...</p>";
            
            try {
                const snap = await getDocs(collection(db, "ordens"));
                lista.innerHTML = ""; 
                let totalA = 0;
                
                snap.forEach(dDoc => {
                    const d = dDoc.data(); 
                    const status = (d.status || "").toUpperCase().trim();
                    
                    if (status === "PENDENTE" || status === "AGUARDANDO PAGAMENTO") {
                        ordensBancada[d.id] = d; // Salva na memória
                        const valFinal = parseFloat(d.valor_servico || 0); 
                        totalA += valFinal;
                        
                        let borderColor = status === 'PENDENTE' ? 'border-l-orange-500' : 'border-l-green-500';
                        let badgeClass = status === 'PENDENTE' ? 'bg-orange-950 text-orange-300' : 'bg-green-950 text-green-300';
                        let btnLancarReceber = status === 'PENDENTE' ? 
                            `<button onclick="abrirLancamento('${d.id}')" class="flex-1 bg-blue-600 text-white py-4 rounded-3xl font-black text-xs uppercase shadow-md active:bg-blue-700">LANÇAR</button>` : 
                            `<button onclick="prepararFinalizacao('${d.id}')" class="flex-1 bg-green-600 text-white py-4 rounded-3xl font-black text-xs uppercase shadow-md active:bg-green-700">RECEBER</button>`;

                        let servicoTexto = d.servico_principal ? `<div class="bg-zinc-800 text-slate-200 p-3 rounded-2xl mb-3 font-black uppercase text-[10px] leading-tight border border-zinc-700">🛠 ${d.servico_principal.replace(/\+/g, ' | ')}</div>` : '';

                        lista.innerHTML += `
                            <div class="bg-zinc-900 p-5 rounded-[2.5rem] mb-5 shadow-2xl border border-zinc-800 border-l-[14px] ${borderColor} relative">
                                <div class="absolute right-6 top-6">
                                    <input type="checkbox" id="chk${d.id}" onchange="toggleSelecao('${d.id}')" class="w-8 h-8 accent-blue-500 shadow-lg cursor-pointer">
                                </div>
                                <div class="flex justify-between items-center mb-2 pr-12">
                                    <span class="text-[10px] font-black uppercase px-3 py-1 rounded-full ${badgeClass} italic border border-current/20">${status}</span>
                                    <span class="text-[10px] font-black text-blue-300 bg-blue-950 border border-blue-900 px-3 py-1 rounded-lg"># ${d.codigo_maquina}</span>
                                </div>
                                <h3 class="text-xl font-black text-white uppercase leading-none">${d.equipamento}</h3>
                                <p class="text-[11px] font-bold text-zinc-400 mb-2 uppercase italic">👤 ${d.cliente}</p>
                                ${servicoTexto}
                                <div class="flex gap-2">
                                    ${btnLancarReceber}
                                    <button onclick='window.imprimirCupom(${JSON.stringify(d)}, "OS")' class="bg-zinc-800 border border-zinc-700 p-4 rounded-3xl text-xl active:bg-zinc-700 text-white">🖨️</button>
                                </div>
                            </div>
                        `;
                    }
                });
                document.getElementById('resumoGeralBancada').innerText = `R$ ${totalA.toFixed(2)}`;
            } catch (e) { alert(e.message); }
        }

        // ==========================================
        // 4. MULTI-LANÇAMENTOS (CARRINHO E DESCONTO)
        // ==========================================
        window.abrirLancamento = async (id) => {
            idAtual = id; 
            listaServicosTemporaria = []; 
            atualizarListaCarrinho();
            document.getElementById('inputDescontoLancamento').value = "";
            document.getElementById('modalServicos').classList.remove('hidden');
            
            const listaTabela = document.getElementById('listaDeServicos');
            listaTabela.innerHTML = "<p class='p-5 text-center font-black animate-pulse text-blue-400'>Buscando...</p>";
            
            try {
                const snap = await getDocs(collection(db, "servicos_lista"));
                listaTabela.innerHTML = "";
                snap.forEach(dDoc => {
                    const s = dDoc.data(); 
                    const nomeTabela = s.servicos_lista || s.servico || s.nome || dDoc.id; 
                    const valorTabela = s.valor || s.preco || 0;
                    listaTabela.innerHTML += `
                        <button onclick="adicionarAoCarrinho('${nomeTabela}', ${valorTabela})" class="w-full p-4 mb-2 bg-zinc-800 border border-zinc-700 rounded-xl text-left active:border-blue-500 shadow-sm">
                            <div class="font-black text-white uppercase text-[10px]">${nomeTabela}</div>
                            <div class="text-green-400 font-black text-[10px]">R$ ${parseFloat(valorTabela).toFixed(2)}</div>
                        </button>
                    `;
                });
            } catch (e) { alert("Erro: " + e.message); }
        };

        window.adicionarAoCarrinho = (nome, preco) => {
            listaServicosTemporaria.push({nome: nome, preco: preco});
            atualizarListaCarrinho();
        };

        window.removerDoCarrinho = (index) => {
            listaServicosTemporaria.splice(index, 1);
            atualizarListaCarrinho();
        };

        window.atualizarListaCarrinho = () => {
            const divCarrinho = document.getElementById('carrinhoServicos');
            const totalDisplay = document.getElementById('totalCarrinho');
            divCarrinho.innerHTML = ""; 
            let soma = 0;
            
            listaServicosTemporaria.forEach((s, i) => {
                soma += s.preco;
                divCarrinho.innerHTML += `
                    <div class="flex justify-between items-center bg-zinc-800 border border-zinc-700 p-2 rounded-lg mb-1">
                        <span class="text-[9px] font-black uppercase text-white">${s.nome}</span>
                        <button onclick="removerDoCarrinho(${i})" class="text-red-400 font-bold px-3 text-lg active:text-red-600">×</button>
                    </div>
                `;
            });
            totalDisplay.innerText = "R$ " + soma.toFixed(2);
        };

        window.finalizarAgrupamento = async () => {
            if(listaServicosTemporaria.length === 0) return alert("Adicione ao menos 1 serviço!");
            
            const nomesCompilados = listaServicosTemporaria.map(s => s.nome).join(' + ');
            const valorBruto = listaServicosTemporaria.reduce((a, b) => a + b.preco, 0);
            const descLanc = parseFloat(document.getElementById('inputDescontoLancamento').value || 0);
            
            const valorLiquido = valorBruto - descLanc;

            try {
                await updateDoc(doc(db, "ordens", idAtual.toString()), { 
                    servico_principal: nomesCompilados.toUpperCase(), 
                    valor_bruto: valorBruto, 
                    valor_servico: valorLiquido, 
                    desconto: descLanc, 
                    status: "AGUARDANDO PAGAMENTO" 
                });
                document.getElementById('modalServicos').classList.add('hidden'); 
                carregarPendentes();
            } catch (e) { alert("Erro: " + e.message); }
        };

        // ==========================================
        // 5. RECEBIMENTO (DESCONTO FINAL E FORMAS)
        // ==========================================
        window.prepararFinalizacao = async (id) => {
            idAtual = id; 
            document.getElementById('modalPagamento').classList.remove('hidden');
            
            try {
                const dSnap = await getDoc(doc(db, "ordens", id.toString())); 
                const dados = dSnap.data();
                
                valorBrutoGlobal = parseFloat(dados.valor_bruto) || (parseFloat(dados.valor_servico || 0) + parseFloat(dados.desconto || 0));
                const descGravado = parseFloat(dados.desconto || 0);
                
                document.getElementById('inputDescontoPagamento').value = descGravado > 0 ? descExistente : "";
                atualizarTotalComDescontoPagamento();
                
                const snapP = await getDocs(collection(db, "formas_pagamento"));
                const listaP = document.getElementById('listaFormasPag'); 
                listaP.innerHTML = "";
                
                snapP.forEach(dDoc => {
                    const f = dDoc.data();
                    const nomeF = f.formas_pagamento || f.forma_pagamento || f.nome || dDoc.id;
                    listaP.innerHTML += `
                        <label class="flex items-center p-4 bg-zinc-800 border border-zinc-700 rounded-xl mb-2 has-[:checked]:border-blue-500 has-[:checked]:bg-zinc-700 transition-all">
                            <input type="radio" name="pag" value="${nomeF}" class="w-6 h-6 accent-blue-500">
                            <span class="ml-4 font-black text-white uppercase text-xs italic">${nomeF}</span>
                        </label>
                    `;
                });
            } catch(e) { alert("Erro: " + e.message); }
        };

        window.atualizarTotalComDescontoPagamento = () => {
            const desc = parseFloat(document.getElementById('inputDescontoPagamento').value || 0);
            const total = valorBrutoGlobal - desc;
            document.getElementById('displayValorPagamento').innerText = "R$ " + total.toFixed(2);
        };

        window.confirmarPagamento = async () => {
            const radio = document.querySelector('input[name="pag"]:checked');
            if(!radio) return alert("Selecione a Forma de Pagamento!");
            
            const novoDesc = parseFloat(document.getElementById('inputDescontoPagamento').value || 0);
            const novoLiquido = valorBrutoGlobal - novoDesc;
            
            try {
                const docRef = doc(db, "ordens", idAtual.toString()); 
                const dSnap = await getDoc(docRef); 
                const dados = dSnap.data();
                
                dados.status = "PAGO"; 
                dados.forma_pagamento = radio.value.toUpperCase(); 
                dados.data_pagamento = new Date().toLocaleDateString('pt-BR');
                dados.desconto = novoDesc;
                dados.valor_servico = novoLiquido;
                dados.valor_bruto = valorBrutoGlobal;
                
                await updateDoc(docRef, dados); 
                if(confirm("PAGO! Deseja imprimir o recibo agora?")) window.imprimirCupom(dados, 'RECIBO');
                document.getElementById('modalPagamento').classList.add('hidden'); 
                carregarPendentes();
            } catch (e) { alert("Erro: " + e.message); }
        };

        // ==========================================
        // 6. ENTRADA E SELETORES
        // ==========================================
        window.abrirSeletor = async (tipo) => {
            const modal = document.getElementById('modalSeletorGeral'); 
            const lista = document.getElementById('listaSeletorGeral');
            modal.classList.remove('hidden'); 
            lista.innerHTML = "<p class='p-10 text-center font-black animate-pulse text-blue-400'>Buscando...</p>";
            
            try {
                const snap = await getDocs(collection(db, tipo)); 
                lista.innerHTML = "";
                snap.forEach(dDoc => { 
                    const d = dDoc.data(); 
                    const n = d.nome || d.equipamento || dDoc.id;
                    lista.innerHTML += `
                        <button onclick="definirItem('${tipo}', '${n}')" class="w-full p-5 text-left border-b border-zinc-800 font-black uppercase text-white text-sm active:bg-zinc-800">
                            ${n}
                        </button>
                    `; 
                });
            } catch (e) { alert("Erro: " + e.message); }
        };

        window.definirItem = (tipo, valor) => {
            if(tipo === 'clientes') document.getElementById('inputCliente').value = valor;
            else document.getElementById('inputEquipamento').value = valor;
            document.getElementById('modalSeletorGeral').classList.add('hidden');
        };

        window.salvarEntrada = async () => {
            const c = document.getElementById('inputCliente').value; 
            const e = document.getElementById('inputEquipamento').value; 
            const d = document.getElementById('defeito').value.toUpperCase();
            const manualCod = document.getElementById('inputManualCod').value.toUpperCase().trim();
            
            if(!c || !e) return alert("Preencha Cliente e Equipamento!");
            
            try {
                const snapID = await getDocs(collection(db, "ordens")); 
                let maior = 0;
                snapID.forEach(docS => { const idN = parseInt(docS.id); if(!isNaN(idN) && idN > maior) maior = idN; });
                
                const novoID = (maior + 1).toString();
                const codF = manualCod !== "" ? manualCod : Math.random().toString(36).substring(2,5).toUpperCase() + Math.floor(100 + Math.random() * 900);
                
                const dados = { 
                    id: parseInt(novoID), codigo_maquina: codF, cliente: c, equipamento: e, defeito: d, 
                    status: "PENDENTE", data_entrada: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now(), 
                    servico_principal: "", valor_servico: 0, forma_pagamento: "", data_pagamento: "", desconto: 0, valor_bruto: 0 
                };
                
                await setDoc(doc(db, "ordens", novoID), dados); 
                alert(`GRAVADO COM SUCESSO!\n\nID OS: ${novoID}\nCÓDIGO: ${codF}`);
                
                document.getElementById('inputCliente').value = ""; 
                document.getElementById('inputEquipamento').value = ""; 
                document.getElementById('defeito').value = ""; 
                document.getElementById('inputManualCod').value = "";
                
                mudarAba('pendentes');
            } catch (e) { alert("Erro: " + e.message); }
        };

        // ==========================================
        // 7. CONSULTA HISTÓRICO
        // ==========================================
        window.buscarHistorico = async () => {
            const cod = document.getElementById('inputBuscaCod').value.toUpperCase().trim();
            const resultado = document.getElementById('resultadoConsulta');
            
            if(cod.length < 3) return alert("Digite o Código da Máquina!");
            resultado.innerHTML = "<p class='p-10 text-center animate-pulse font-black text-blue-400'>Buscando...</p>";
            
            try {
                const q = query(collection(db, "ordens"), where("codigo_maquina", "==", cod));
                const snap = await getDocs(q);
                
                if(snap.empty) { 
                    resultado.innerHTML = "<p class='p-10 text-center text-red-400 font-black'>NENHUM HISTÓRICO ENCONTRADO!</p>"; 
                    return; 
                }
                
                let listaH = []; 
                snap.forEach(d => listaH.push(d.data())); 
                listaH.sort((a,b) => b.timestamp - a.timestamp);
                
                resultado.innerHTML = `<h2 class="text-white font-black mb-4 uppercase italic">Histórico: ${cod}</h2>`;
                
                listaH.forEach(h => {
                    const total = parseFloat(h.valor_servico || 0);
                    const colorBorder = h.status === 'PAGO' ? 'border-l-green-500' : 'border-l-orange-500';
                    const colorStatus = h.status === 'PAGO' ? 'text-green-400' : 'text-orange-400';

                    resultado.innerHTML += `
                        <div class="bg-zinc-900 p-4 rounded-3xl mb-4 shadow-2xl border border-zinc-800 border-l-8 ${colorBorder}">
                            <div class="flex justify-between mb-2">
                                <span class="text-[9px] font-black bg-zinc-800 text-zinc-300 border border-zinc-700 p-1 px-2 rounded">OS: ${h.id}</span>
                                <span class="text-[9px] font-black italic uppercase ${colorStatus}">${h.status}</span>
                            </div>
                            <p class="text-xs font-black text-white uppercase">${h.equipamento}</p>
                            <div class="text-[10px] bg-zinc-800 text-slate-200 border border-zinc-700 p-2 rounded-lg my-2 leading-tight">
                                <b>DEF:</b> ${h.defeito}<br>
                                <b>SERV:</b> ${h.servico_principal ? h.servico_principal.replace(/\+/g, ' | ') : '---'}
                            </div>
                            <div class="flex justify-between items-center pt-1 border-t border-zinc-800 mt-2">
                                <p class="font-black text-green-400 text-xs">PAGO: R$ ${total.toFixed(2)}</p>
                                <p class="text-[8px] font-bold text-zinc-500">${h.data_entrada}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (e) { alert("Erro: " + e.message); }
        };

        window.onload = () => carregarPendentes();
    </script>
</head>
<body class="bg-zinc-950 text-slate-100 min-h-screen font-sans">
    
    <div id="areaImpressao"></div>

    <header class="flex flex-col items-center justify-center pt-5 pb-3 bg-zinc-950 border-b border-zinc-900">
        <h1 class="text-xl font-black text-blue-500 uppercase tracking-tighter italic">Emanuel Soluções</h1>
    </header>

    <nav class="flex bg-zinc-900 shadow-xl p-2 sticky top-0 z-[50] gap-1 border-b border-zinc-800">
        <button id="btnAbaEntrada" onclick="mudarAba('entrada')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-zinc-400 transition-all">Nova Entrada</button>
        <button id="btnAbaPendentes" onclick="mudarAba('pendentes')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] bg-blue-600 text-white shadow-md transition-all">Bancada</button>
        <button id="btnAbaConsulta" onclick="mudarAba('consulta')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-zinc-400 transition-all">Histórico</button>
    </nav>

    <div id="telaConsulta" class="tela hidden p-4 max-w-md mx-auto">
        <div class="bg-zinc-900 rounded-[2rem] p-6 shadow-2xl mb-6 text-center border border-zinc-800">
            <h2 class="text-lg font-black text-white uppercase italic mb-4">Buscar Código</h2>
            <input id="inputBuscaCod" type="text" maxlength="6" placeholder="EX: ABC123" class="w-full p-5 rounded-2xl bg-zinc-800 font-black text-white uppercase text-center outline-none mb-4 border border-zinc-700 focus:border-blue-500 placeholder:text-zinc-600">
            <button onclick="buscarHistorico()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black italic uppercase shadow-lg active:bg-blue-700">VER HISTÓRICO</button>
        </div>
        <div id="resultadoConsulta" class="pb-24"></div>
    </div>

    <div id="telaPendentes" class="tela p-4 max-w-md mx-auto">
        <div class="bg-blue-600 rounded-[2.5rem] p-7 mb-6 text-white text-center shadow-2xl border border-blue-500">
            <p class="text-[10px] font-black opacity-80 uppercase italic tracking-widest">A Receber Total</p>
            <h1 id="resumoGeralBancada" class="text-4xl font-black italic tracking-tighter">R$ 0,00</h1>
        </div>
        
        <div id="btnLote" class="hidden justify-between items-center bg-green-600 rounded-[2.5rem] p-6 mb-6 text-white shadow-2xl border border-green-500 animate-bounce">
            <div>
                <p id="txtQtdLote" class="text-[10px] font-black uppercase italic">0 MÁQS</p>
                <p id="txtTotalLote" class="text-2xl font-black italic text-white">R$ 0,00</p>
            </div>
            <button onclick="imprimirLote()" class="bg-white text-green-700 px-6 py-4 rounded-3xl font-black text-[10px] uppercase shadow-md active:scale-95 transition-all">GERAR LOTE</button>
        </div>
        
        <div id="listaPendentes" class="pb-24"></div>
    </div>

    <div id="telaEntrada" class="tela hidden p-4 space-y-5 max-w-md mx-auto text-center">
        <header class="py-2"><h1 class="text-3xl font-black text-white uppercase italic tracking-tighter">Nova Entrada</h1></header>
        <input id="inputCliente" readonly onclick="abrirSeletor('clientes')" type="text" placeholder="SELECIONAR CLIENTE" class="w-full p-6 rounded-[2rem] bg-zinc-900 shadow-xl font-black text-white uppercase outline-none border border-zinc-800 placeholder:text-zinc-500 active:bg-zinc-800">
        <input id="inputEquipamento" readonly onclick="abrirSeletor('maquinas')" type="text" placeholder="EQUIPAMENTO" class="w-full p-6 rounded-[2rem] bg-zinc-900 shadow-xl font-black text-white uppercase outline-none border border-zinc-800 placeholder:text-zinc-500 active:bg-zinc-800">
        <input id="inputManualCod" type="text" maxlength="6" placeholder="CÓDIGO MANUAL (OPCIONAL)" class="w-full p-6 rounded-[2rem] bg-zinc-800 shadow-md font-black text-white uppercase outline-none border border-zinc-700 focus:border-blue-500 placeholder:text-zinc-600">
        <textarea id="defeito" placeholder="DESCREVA O DEFEITO..." class="w-full p-6 rounded-[2rem] bg-zinc-800 shadow-md font-bold text-slate-200 h-36 uppercase outline-none border border-zinc-700 focus:border-blue-500 placeholder:text-zinc-600"></textarea>
        <button id="btnGravar" onclick="salvarEntrada()" class="w-full bg-blue-600 text-white p-7 rounded-[3rem] font-black text-xl shadow-2xl active:bg-blue-700 mt-4">GRAVAR ENTRADA</button>
    </div>

    <div id="modalPagamento" class="hidden fixed inset-0 bg-black/95 z-[110] p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[3rem] p-8 flex flex-col max-h-[90vh] shadow-2xl border border-zinc-800">
            <h2 class="text-2xl font-black text-white uppercase italic text-center mb-4">Receber</h2>
            <div class="text-center mb-4">
                <p class="text-[10px] font-black text-zinc-500 uppercase">Valor Líquido</p>
                <h3 class="text-5xl font-black text-green-400 italic tracking-tighter" id="displayValorPagamento">R$ 0,00</h3>
            </div>
            <div class="mb-5">
                <p class="text-[9px] font-black text-zinc-400 mb-1 px-1">ALTERAR DESCONTO (R$)</p>
                <input type="number" oninput="atualizarTotalComDescontoPagamento()" placeholder="0,00" class="w-full p-4 rounded-xl bg-zinc-800 font-black text-red-400 outline-none border border-zinc-700 focus:border-red-500 text-center placeholder:text-zinc-600" id="inputDescontoPagamento">
            </div>
            <p class="text-[10px] font-black text-zinc-400 mb-2 px-1">FORMA DE PAGAMENTO:</p>
            <div id="listaFormasPag" class="overflow-y-auto flex-1 mb-6 pr-1 max-h-[25vh]"></div>
            <div class="flex gap-3 pt-3 border-t border-zinc-800">
                <button onclick="document.getElementById('modalPagamento').classList.add('hidden')" class="flex-1 bg-zinc-700 text-zinc-300 p-5 rounded-3xl font-black text-xs uppercase active:bg-zinc-600">Sair</button>
                <button onclick="confirmarPagamento()" class="flex-2 bg-green-600 text-white p-5 rounded-3xl font-black text-xs uppercase shadow-lg active:bg-green-700">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="modalServicos" class="hidden fixed inset-0 bg-black/95 z-[100] p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[3rem] p-6 flex flex-col max-h-[90vh] shadow-2xl border border-zinc-800">
            <h2 class="text-xl font-black text-white uppercase italic mb-4 text-center tracking-tight">Lançar Serviços</h2>
            
            <div id="carrinhoServicos" class="bg-zinc-800 border border-zinc-700 p-3 rounded-2xl min-h-[60px] max-h-[150px] overflow-y-auto mb-3"></div>
            <div class="flex justify-between px-2 mb-4 border-b border-zinc-800 pb-3 items-center">
                <span class="font-black text-zinc-400 uppercase text-[10px]">Total Parcial:</span>
                <span id="totalCarrinho" class="font-black text-green-400 text-xl tracking-tighter">R$ 0,00</span>
            </div>

            <div class="mb-4">
                <p class="text-[9px] font-black text-zinc-400 mb-1 px-1">APLICAR DESCONTO (R$)</p>
                <input id="inputDescontoLancamento" type="number" placeholder="0.00" class="w-full p-4 rounded-xl bg-zinc-800 border border-zinc-700 font-black text-center text-red-400 outline-none focus:border-red-500 placeholder:text-zinc-600">
            </div>

            <div id="listaDeServicos" class="overflow-y-auto flex-1 pr-1 border-t border-zinc-800 pt-3"></div>
            
            <div class="flex gap-2 mt-4 pt-3 border-t border-zinc-800">
                <button onclick="document.getElementById('modalServicos').classList.add('hidden')" class="flex-1 bg-zinc-700 text-zinc-300 p-4 rounded-2xl font-black text-xs uppercase active:bg-zinc-600">Cancelar</button>
                <button onclick="finalizarAgrupamento()" class="flex-2 bg-blue-600 text-white p-4 rounded-2xl font-black text-xs uppercase shadow-lg active:bg-blue-700">Salvar</button>
            </div>
        </div>
    </div>

    <div id="modalSeletorGeral" class="hidden fixed inset-0 bg-black/90 z-[100] p-4 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-zinc-900 w-full max-w-sm rounded-[3rem] shadow-2xl max-h-[80vh] flex flex-col overflow-hidden border border-zinc-800">
            <div class="p-6 border-b border-zinc-800 bg-zinc-800/50 flex justify-between items-center">
                <h2 class="font-black text-white text-sm uppercase italic tracking-tight">Selecionar</h2>
            </div>
            <div id="listaSeletorGeral" class="overflow-y-auto flex-1 bg-zinc-950"></div>
            <button onclick="document.getElementById('modalSeletorGeral').classList.add('hidden')" class="p-5 bg-zinc-800 text-zinc-400 font-black text-xs uppercase border-t border-zinc-800 active:bg-zinc-700 active:text-white">Fechar Janela</button>
        </div>
    </div>

</body>
</html>
