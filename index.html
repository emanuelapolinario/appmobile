<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oficina Emanuel - Sistema Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #areaImpressao { display: none; }
        @media print {
            body * { visibility: hidden; }
            #areaImpressao, #areaImpressao * { visibility: visible; }
            #areaImpressao { display: block !important; position: absolute; left: 0; top: 0; width: 52mm; margin: 0; padding: 0; background: white; }
            @page { size: 58mm auto; margin: 0; }
            .cupom-texto { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.2; text-transform: uppercase; color: black; }
            .hr { border-bottom: 1px dashed black; margin: 5px 0; width: 100%; }
            .c { text-align: center; } .b { font-weight: bold; }
            .espaco-fim { height: 60px; }
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, updateDoc, getDocs, getDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB9_vQUtyjCx8KQw3k5fPlutOD-ekCaHw8",
            authDomain: "projeto-app-entregadores.firebaseapp.com",
            projectId: "projeto-app-entregadores",
            storageBucket: "projeto-app-entregadores.firebasestorage.app",
            messagingSenderId: "857050021216",
            appId: "1:857050021216:web:a16943cd5a272b0c4d3205"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let idAtual = null;
        let itensSelecionados = [];
        let clienteAtualSelecao = null;

        // --- NAVEGAÇÃO ENTRE ABAS ---
        window.mudarAba = (aba) => {
            document.getElementById('telaEntrada').classList.add('hidden');
            document.getElementById('telaPendentes').classList.add('hidden');
            document.getElementById('telaConsulta').classList.add('hidden');
            
            document.getElementById('btnAbaEntrada').className = "flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-blue-900";
            document.getElementById('btnAbaPendentes').className = "flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-blue-900";
            document.getElementById('btnAbaConsulta').className = "flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-blue-900";

            if(aba === 'entrada') {
                document.getElementById('telaEntrada').classList.remove('hidden');
                document.getElementById('btnAbaEntrada').classList.add('bg-blue-900', 'text-white', 'shadow-md');
            } else if(aba === 'pendentes') {
                document.getElementById('telaPendentes').classList.remove('hidden');
                document.getElementById('btnAbaPendentes').classList.add('bg-blue-900', 'text-white', 'shadow-md');
                carregarPendentes();
            } else if(aba === 'consulta') {
                document.getElementById('telaConsulta').classList.remove('hidden');
                document.getElementById('btnAbaConsulta').classList.add('bg-blue-900', 'text-white', 'shadow-md');
            }
        };

        // --- BUSCA DE HISTÓRICO POR CÓDIGO ---
        window.buscarHistorico = async () => {
            const cod = document.getElementById('inputBuscaCod').value.toUpperCase().trim();
            const resultado = document.getElementById('resultadoConsulta');
            if(cod.length < 3) return alert("DIGITE O CÓDIGO COMPLETO!");

            resultado.innerHTML = "<p class='p-10 text-center animate-pulse font-black'>BUSCANDO HISTÓRICO...</p>";
            
            try {
                const q = query(collection(db, "ordens"), where("codigo_maquina", "==", cod));
                const snap = await getDocs(q);
                
                if(snap.empty) {
                    resultado.innerHTML = "<p class='p-10 text-center text-red-500 font-black uppercase'>NENHUM REGISTRO ENCONTRADO!</p>";
                    return;
                }

                let listaH = [];
                snap.forEach(d => listaH.push(d.data()));
                // Ordenar por data (mais recente primeiro)
                listaH.sort((a, b) => b.timestamp - a.timestamp);

                resultado.innerHTML = `<h2 class="text-blue-900 font-black mb-4 uppercase italic">Histórico da Máquina: ${cod}</h2>`;
                
                listaH.forEach(h => {
                    resultado.innerHTML += `
                        <div class="bg-white p-5 rounded-[2rem] mb-4 shadow-md border-l-8 ${h.status === 'PAGO' ? 'border-green-500' : 'border-orange-500'}">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-[10px] font-black bg-slate-100 px-2 py-1 rounded">OS: ${h.id}</span>
                                <span class="text-[10px] font-black ${h.status === 'PAGO' ? 'text-green-600' : 'text-orange-600'} italic underline">${h.status}</span>
                            </div>
                            <p class="text-xs font-black text-blue-900 uppercase">${h.equipamento}</p>
                            <p class="text-[10px] text-gray-400 font-bold mb-2 uppercase">CLIENTE: ${h.cliente}</p>
                            <div class="text-[11px] bg-slate-50 p-2 rounded-lg mb-2 font-bold">
                                <b>DEFEITO:</b> ${h.defeito}<br>
                                <b>SERVIÇO:</b> ${h.servico_principal || '---'}<br>
                                <b>ENTRADA:</b> ${h.data_entrada}
                            </div>
                            <div class="flex justify-between items-center">
                                <p class="font-black text-green-700">R$ ${parseFloat(h.valor_servico).toFixed(2)}</p>
                                <p class="text-[9px] font-black opacity-40">${h.data_pagamento || ''}</p>
                            </div>
                        </div>`;
                });
            } catch (e) { alert(e.message); }
        };

        // --- IMPRESSÃO ---
        window.dispararPrint = (html) => {
            const area = document.getElementById('areaImpressao');
            area.innerHTML = `<div class="cupom-texto">${html}</div>`;
            setTimeout(() => { window.print(); }, 500);
        };

        window.imprimirCupom = (dados, tipo = 'OS') => {
            const layout = `
                <div class="c b">EMANUEL SOLUCOES TECNOLOGICAS</div>
                <div class="c">${tipo === 'OS' ? 'ORDEM DE SERVICO' : 'RECIBO DE PAGAMENTO'}</div>
                <div class="hr"></div>
                <div class="b">OS: ${dados.id} - COD: ${dados.codigo_maquina}</div>
                <div class="hr"></div>
                <div>DATA: ${dados.data_entrada}</div>
                <div>CLIENTE: ${dados.cliente}</div>
                <div>EQUIP.: ${dados.equipamento}</div>
                <div class="hr"></div>
                <div class="b">DEFEITO:</div>
                <div>${dados.defeito}</div>
                ${dados.servico_principal ? `
                    <div class="hr"></div>
                    <div class="b">SERVICO:</div>
                    <div>${dados.servico_principal}</div>
                    <div class="c b" style="font-size:18px; margin-top:10px">TOTAL: R$ ${parseFloat(dados.valor_servico).toFixed(2)}</div>
                ` : `
                    <div class="hr"></div>
                    <div style="height:40px; border-bottom:1px solid black; margin-top:20px"></div>
                    <div class="c" style="font-size:10px">ASSINATURA DO CLIENTE</div>
                `}
                <div class="hr"></div>
                <div class="c b">AGRADECEMOS A PREFERENCIA!</div>
                <div class="c" style="font-size:10px">DEUS E FIEL</div>
                <div class="espaco-fim"></div>`;
            window.dispararPrint(layout);
        };

        window.imprimirLote = () => {
            if (itensSelecionados.length < 2) return alert("Selecione 2 ou mais!");
            let totalLote = 0; let itensHTML = "";
            itensSelecionados.forEach(i => {
                totalLote += i.valor;
                itensHTML += `<div style="margin-top:8px"><b>ID: ${i.id} - COD: ${i.cod}</b><br>DEF: ${i.defeito}<br>VALOR: R$ ${i.valor.toFixed(2)}</div><div style="border-bottom:1px solid #eee; margin:4px 0"></div>`;
            });
            const layout = `<div class="c b">EMANUEL SOLUCOES TECNOLOGICAS</div><div class="c b">FECHAMENTO DE LOTE</div><div class="hr"></div><div>CLIENTE: ${clienteAtualSelecao}</div><div class="hr"></div>${itensHTML}<div class="hr"></div><div class="c b" style="font-size:18px">TOTAL: R$ ${totalLote.toFixed(2)}</div><div class="espaco-fim"></div>`;
            window.dispararPrint(layout);
        };

        window.toggleSelecao = (id, cliente, valor, cod, defeito, servico) => {
            const index = itensSelecionados.findIndex(i => i.id === id);
            if (index > -1) {
                itensSelecionados.splice(index, 1);
                if (itensSelecionados.length === 0) clienteAtualSelecao = null;
            } else {
                if (clienteAtualSelecao && clienteAtualSelecao !== cliente) {
                    alert("MESMO CLIENTE APENAS!");
                    document.getElementById('chk' + id).checked = false;
                    return;
                }
                clienteAtualSelecao = cliente;
                itensSelecionados.push({ id, valor, cod, defeito, servico });
            }
            const total = itensSelecionados.reduce((a, b) => a + b.valor, 0);
            document.getElementById('btnLote').classList.toggle('hidden', itensSelecionados.length < 2);
            document.getElementById('txtTotalLote').innerText = `R$ ${total.toFixed(2)}`;
            document.getElementById('txtQtdLote').innerText = `${itensSelecionados.length} MÁQUINAS`;
        };

        async function carregarPendentes() {
            itensSelecionados = []; clienteAtualSelecao = null;
            document.getElementById('btnLote').classList.add('hidden');
            const lista = document.getElementById('listaPendentes');
            lista.innerHTML = "<p class='p-10 text-center font-black animate-pulse'>ATUALIZANDO...</p>";
            try {
                const snap = await getDocs(collection(db, "ordens"));
                lista.innerHTML = ""; let totalA = 0;
                snap.forEach(dDoc => {
                    const d = dDoc.data(); const status = (d.status || "").toUpperCase().trim();
                    if (status === "PENDENTE" || status === "AGUARDANDO PAGAMENTO") {
                        totalA += (d.valor_servico || 0);
                        lista.innerHTML += `<div class="bg-white p-5 rounded-[2.5rem] mb-5 shadow-xl border-l-[14px] ${status === 'PENDENTE' ? 'border-orange-500' : 'border-green-600'} relative">
                                <div class="absolute right-6 top-6"><input type="checkbox" id="chk${d.id}" onchange="toggleSelecao('${d.id}', '${d.cliente}', ${d.valor_servico || 0}, '${d.codigo_maquina}', '${d.defeito}', '${d.servico_principal || 'PENDENTE'}')" class="w-8 h-8 rounded-full accent-blue-900"></div>
                                <div class="flex justify-between items-center mb-2 pr-12"><span class="text-[10px] font-black uppercase px-3 py-1 rounded-full ${status === 'PENDENTE' ? 'bg-orange-50 text-orange-600' : 'bg-green-50 text-green-600'} italic">${status}</span><span class="text-[10px] font-black text-blue-900 bg-blue-50 px-3 py-1 rounded-lg"># ${d.codigo_maquina}</span></div>
                                <h3 class="text-2xl font-black text-blue-900 uppercase leading-none">${d.equipamento}</h3>
                                <p class="text-[11px] font-bold text-gray-500 mb-4 uppercase italic">👤 ${d.cliente}</p>
                                <div class="flex gap-2">
                                    ${status === 'PENDENTE' ? `<button onclick="abrirLancamento('${d.id}')" class="flex-1 bg-blue-900 text-white py-5 rounded-3xl font-black text-xs uppercase shadow-lg">LANÇAR</button>` : `<button onclick="prepararFinalizacao('${d.id}')" class="flex-1 bg-green-600 text-white py-5 rounded-3xl font-black text-xs uppercase shadow-lg">RECEBER</button>`}
                                    <button onclick='window.imprimirCupom(${JSON.stringify(d)}, "OS")' class="bg-gray-100 p-5 rounded-3xl text-xl">🖨️</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('resumoGeralBancada').innerText = `R$ ${totalA.toFixed(2)}`;
            } catch (e) { alert(e.message); }
        }

        window.abrirLancamento = async (id) => {
            idAtual = id; document.getElementById('modalServicos').classList.remove('hidden');
            const lista = document.getElementById('listaDeServicos');
            const snap = await getDocs(collection(db, "servicos_lista"));
            lista.innerHTML = "";
            snap.forEach(dDoc => {
                const s = dDoc.data(); const n = s.servico_lista || s.servico || dDoc.id; const v = s.valor || 0;
                lista.innerHTML += `<button onclick="confirmarServico('${n}', ${v})" class="w-full p-6 mb-4 bg-slate-50 rounded-[2rem] text-left shadow-sm">
                        <div class="font-black text-blue-900 uppercase text-xs italic">${n}</div>
                        <div class="text-green-600 font-black text-[10px] mt-1 italic">R$ ${v.toFixed(2)}</div>
                    </button>`;
            });
        };

        window.confirmarServico = async (nome, preco) => {
            if(!confirm(`LANÇAR ${nome}?`)) return;
            await updateDoc(doc(db, "ordens", idAtual.toString()), { servico_principal: nome.toUpperCase(), valor_servico: preco, status: "AGUARDANDO PAGAMENTO" });
            document.getElementById('modalServicos').classList.add('hidden'); carregarPendentes();
        };

        window.prepararFinalizacao = async (id) => {
            idAtual = id; document.getElementById('modalPagamento').classList.remove('hidden');
            const dSnap = await getDoc(doc(db, "ordens", id.toString()));
            document.getElementById('displayValor').innerText = "R$ " + dSnap.data().valor_servico.toFixed(2);
            const snapP = await getDocs(collection(db, "formas_pagamento"));
            const listaP = document.getElementById('listaFormasPag'); listaP.innerHTML = "";
            snapP.forEach(dDoc => {
                const f = dDoc.data();
                listaP.innerHTML += `<label class="flex items-center p-5 bg-gray-50 rounded-2xl mb-2"><input type="radio" name="pag" value="${f.nome}" class="w-6 h-6 accent-blue-900"><span class="ml-4 font-black text-blue-900 uppercase text-xs italic">${f.nome}</span></label>`;
            });
        };

        window.confirmarPagamento = async () => {
            const radio = document.querySelector('input[name="pag"]:checked'); if(!radio) return alert("FORMA?");
            const docRef = doc(db, "ordens", idAtual.toString()); const dSnap = await getDoc(docRef); const dados = dSnap.data();
            dados.status = "PAGO"; dados.forma_pagamento = radio.value.toUpperCase(); dados.data_pagamento = new Date().toLocaleDateString('pt-BR');
            await updateDoc(docRef, dados); if(confirm("PAGO! IMPRIMIR?")) window.imprimirCupom(dados, 'RECIBO');
            document.getElementById('modalPagamento').classList.add('hidden'); carregarPendentes();
        };

        window.abrirSeletor = async (tipo) => {
            const modal = document.getElementById('modal'); const lista = document.getElementById('listaItens');
            modal.classList.remove('hidden'); lista.innerHTML = "<p class='p-10 text-center font-black animate-pulse'>...</p>";
            const snap = await getDocs(collection(db, tipo)); lista.innerHTML = "";
            snap.forEach(dDoc => {
                const d = dDoc.data(); const n = tipo === 'clientes' ? (d.nome || d.BETINHO || dDoc.id) : (d.equipamento || d.nome);
                lista.innerHTML += `<button onclick="definirItem('${tipo}', '${n}')" class="w-full p-6 text-left border-b font-black uppercase text-blue-900 italic">${n}</button>`;
            });
        };

        window.definirItem = (tipo, valor) => {
            if(tipo === 'clientes') document.getElementById('inputCliente').value = valor;
            else document.getElementById('inputEquipamento').value = valor;
            document.getElementById('modal').classList.add('hidden');
        };

        window.salvarEntrada = async () => {
            const c = document.getElementById('inputCliente').value; const e = document.getElementById('inputEquipamento').value; const d = document.getElementById('defeito').value.toUpperCase();
            const manualCod = document.getElementById('inputManualCod').value.toUpperCase().trim();
            if(!c || !e) return alert("DADOS!");
            const snapID = await getDocs(collection(db, "ordens")); let maior = 0;
            snapID.forEach(docS => { const idN = parseInt(docS.id); if(!isNaN(idN) && idN > maior) maior = idN; });
            const novoID = (maior + 1).toString();
            const codF = manualCod !== "" ? manualCod : Math.random().toString(36).substring(2,5).toUpperCase() + Math.floor(100 + Math.random() * 900);
            const dados = { id: parseInt(novoID), codigo_maquina: codF, cliente: c, equipamento: e, defeito: d, status: "PENDENTE", data_entrada: new Date().toLocaleDateString('pt-BR'), timestamp: Date.now(), servico_principal: "", valor_servico: 0, forma_pagamento: "", data_pagamento: "", observacoes: "" };
            await setDoc(doc(db, "ordens", novoID), dados);
            alert(`GRAVADO!\nID: ${novoID}\nCÓDIGO: ${codF}`);
            document.getElementById('inputCliente').value = ""; document.getElementById('inputEquipamento').value = ""; document.getElementById('defeito').value = ""; document.getElementById('inputManualCod').value = "";
            mudarAba('pendentes');
        };

        window.onload = () => carregarPendentes();
    </script>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div id="areaImpressao"></div>

    <nav class="flex bg-white shadow-lg p-2 sticky top-0 z-[50] gap-1">
        <button id="btnAbaEntrada" onclick="mudarAba('entrada')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-blue-900">Entrada</button>
        <button id="btnAbaPendentes" onclick="mudarAba('pendentes')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] bg-blue-900 text-white shadow-md">Bancada</button>
        <button id="btnAbaConsulta" onclick="mudarAba('consulta')" class="flex-1 p-3 rounded-xl font-black uppercase text-[10px] text-blue-900">Consultar</button>
    </nav>

    <div id="telaConsulta" class="hidden p-3 max-w-md mx-auto">
        <div class="bg-white rounded-[2rem] p-5 shadow-xl mb-6">
            <h2 class="text-lg font-black text-blue-900 uppercase italic mb-4 text-center">Consultar Máquina</h2>
            
            <div class="flex items-center gap-2 w-full overflow-hidden">
                <input id="inputBuscaCod" type="text" maxlength="6" 
                    placeholder="CÓDIGO (ABC123)" 
                    class="flex-1 min-w-0 p-4 rounded-xl bg-slate-100 font-black text-blue-900 uppercase outline-none border-2 border-transparent focus:border-blue-900 text-sm">
                
                <button onclick="buscarHistorico()" 
                    class="bg-blue-900 text-white h-[54px] px-5 rounded-xl font-black italic text-xs uppercase shadow-md active:scale-95 shrink-0">
                    VER
                </button>
            </div>
        </div>

        <div id="resultadoConsulta" class="pb-24">
            <p class="text-center text-gray-400 font-bold uppercase text-[10px] p-10 leading-tight">
                Digite o código acima para ver o histórico de serviços.
            </p>
        </div>
    </div>

    <div id="telaEntrada" class="hidden p-4 space-y-5 max-w-md mx-auto">
        <input id="inputCliente" readonly onclick="abrirSeletor('clientes')" type="text" placeholder="CLIENTE" class="w-full p-7 rounded-[2.5rem] bg-white shadow-xl font-black text-blue-900 uppercase outline-none">
        <input id="inputEquipamento" readonly onclick="abrirSeletor('maquinas')" type="text" placeholder="EQUIPAMENTO" class="w-full p-7 rounded-[2.5rem] bg-white shadow-xl font-black text-blue-900 uppercase outline-none">
        <input id="inputManualCod" type="text" maxlength="6" placeholder="CÓDIGO (EM BRANCO = NOVO)" class="w-full p-7 rounded-[2.5rem] bg-white shadow-xl font-black text-blue-900 uppercase outline-none border-2 border-transparent focus:border-blue-900">
        <textarea id="defeito" placeholder="DEFEITO RELATADO..." class="w-full p-7 rounded-[2.5rem] bg-white shadow-xl font-bold text-slate-700 h-44 uppercase outline-none"></textarea>
        <button id="btnGravar" onclick="salvarEntrada()" class="w-full bg-blue-900 text-white p-8 rounded-[3rem] font-black text-xl shadow-2xl">GRAVAR SERVIÇO</button>
    </div>

    <div id="modalServicos" class="hidden fixed inset-0 bg-blue-900/95 z-[100] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 flex flex-col max-h-[85vh] shadow-2xl"><h2 class="text-2xl font-black text-blue-900 uppercase italic mb-6 text-center">Serviços</h2><div id="listaDeServicos" class="overflow-y-auto flex-1 pr-2"></div><button onclick="document.getElementById('modalServicos').classList.add('hidden')" class="mt-6 w-full p-6 bg-slate-100 rounded-3xl font-black text-xs uppercase">Sair</button></div>
    </div>
    <div id="modalPagamento" class="hidden fixed inset-0 bg-blue-900/95 z-[110] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl p-8 flex flex-col max-h-[90vh]"><h2 class="text-2xl font-black text-blue-900 uppercase italic text-center mb-6">Receber</h2><div class="text-center mb-8"><h3 id="displayValor" class="text-5xl font-black text-green-600 italic">R$ 0,00</h3></div><div id="listaFormasPag" class="overflow-y-auto flex-1 mb-8"></div><div class="flex gap-3"><button onclick="document.getElementById('modalPagamento').classList.add('hidden')" class="flex-1 bg-slate-100 p-6 rounded-3xl font-black text-xs uppercase">Sair</button><button onclick="confirmarPagamento()" class="flex-2 bg-green-600 text-white p-6 rounded-3xl font-black text-xs uppercase shadow-lg">Confirmar</button></div></div>
    </div>
    <div id="modal" class="hidden fixed inset-0 bg-blue-900/90 z-[100] p-4 flex items-center justify-center">
        <div class="bg-white w-full max-w-sm rounded-[3rem] shadow-2xl max-h-[80vh] flex flex-col overflow-hidden"><div class="p-8 border-b flex justify-between items-center bg-slate-50"><h2 class="font-black text-blue-900 text-sm uppercase italic">Selecionar</h2><button onclick="document.getElementById('modal').classList.add('hidden')" class="text-red-500 font-black text-[10px] uppercase bg-red-100 px-6 py-2 rounded-full">Fechar</button></div><div id="listaItens" class="overflow-y-auto flex-1"></div></div>
    </div>
</body>
</html>
